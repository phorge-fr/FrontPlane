apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: dex
    namespace: dexidp
spec:
    chart:
        spec:
            chart: dex
            sourceRef:
                kind: HelmRepository
                name: dexidp
            version: '*'
    interval: 1m0s
    values:
        ingress:
            enabled: true
            className: nginx
            annotations:
                cert-manager.io/cluster-issuer: letsencrypt
            hosts:
                - host: auth.phorge.fr
                  paths:
                    - path: /
                      pathType: ImplementationSpecific
            tls:
                - secretName: dexidp-tls
                  hosts:
                    - auth.phorge.fr
        config:
            issuer: https://auth.phorge.fr
            web:
                allowedOrigins:
                    - '*'
            oauth2:
                responseTypes:
                    - code
                skipApprovalScreen: true
                alwaysShowLoginScreen: false
            storage:
                type: memory
            connectors:
                - type: github
                  id: ENC[AES256_GCM,data:Tnk10q6W,iv:AqV01Z7kkJl19UhWMxgKNDAJ+yy5WGZzHW4PLpvSrXI=,tag:WxFZ+TmKmsmZwiaFXiicPg==,type:str]
