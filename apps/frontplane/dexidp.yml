apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: dex
    namespace: dexidp
spec:
    chart:
        spec:
            chart: dex
            sourceRef:
                kind: HelmRepository
                name: dexidp
            version: '*'
    interval: 1m0s
    values:
        ingress:
            enabled: true
            className: nginx
            annotations:
                cert-manager.io/cluster-issuer: letsencrypt
            hosts:
                - host: auth.phorge.fr
                  paths:
                    - path: /
                      pathType: ImplementationSpecific
            tls:
                - secretName: dexidp-tls
                  hosts:
                    - auth.phorge.fr
        config:
            issuer: https://auth.phorge.fr/dex
            storage:
                type: memory
            connectors:
                - type: github
                  id: ENC[AES256_GCM,data:TjfmSLUU,iv:T4Nq8nG2QhF+a8tDZl/Ut0dAix0QP/egyIEF8/hKYH0=,tag:aUTvoq2fEcaA0WLs8YBrMg==,type:str]
