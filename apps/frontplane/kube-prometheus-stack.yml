apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: kube-prometheus-stack
    namespace: kube-prometheus-stack
spec:
    chart:
        spec:
            chart: kube-prometheus-stack
            sourceRef:
                kind: HelmRepository
                name: kube-prometheus-stack
            version: '*'
    interval: 1m0s
    values:
        grafana:
            grafana.ini:
                server:
                    domain: monitoring.phorge.fr
                    root_url: https://monitoring.phorge.fr/
            enabled: true
            adminPassword: ENC[AES256_GCM,data:Hdmu/mP1bIa93eo7cNYdys/KNnTx49Jm,iv:ZSy4BZkYHxK7/xBiRS5IAOp+9Oj94tuG40g3CpMoFnc=,tag:Xq1LxwR04oFLHyJS3oWjIw==,type:str]
            service:
                type: ClusterIP
            ingress:
                enabled: true
                ingressClassName: nginx
                annotations:
                    cert-manager.io/cluster-issuer: letsencrypt
                hosts:
                    - monitoring.phorge.fr
                tls:
                    - secretName: grafana-tls
                      hosts:
                        - monitoring.phorge.fr
            persistence:
                enabled: true
                accessModes:
                    - ReadWriteOnce
                size: 1Gi
        prometheus:
            prometheusSpec:
                retention: 15d
                serviceMonitorSelector: {}
                storageSpec:
                    volumes:
                        - name: incus-metrics-credentials
                          secret:
                            secretName: ENC[AES256_GCM,data:N8oaEYAmQPLBQF8bSKI7/15o5c5Zj/qOMA==,iv:t0gu2sScOS5hjwV+hy0IknptQsLdbH/K85oy7pOhXnQ=,tag:0cq0O4eTjCY9jT1JYguz7Q==,type:str]
                    volumeMounts:
                        - name: incus-metrics-credentials
                          mountPath: /etc/prometheus/tls/incus
                    volumeClaimTemplate:
                        spec:
                            storageClassName: longhorn
                            accessModes:
                                - ReadWriteOnce
                            resources:
                                requests:
                                    storage: 20Gi
                additionalScrapeConfigs:
                    - job_name: incus
                      metrics_path: /1.0/metrics
                      scheme: https
                      static_configs:
                        - targets: null
                        - 10.1.0.1:8444
                        - 10.1.0.2:8444
                        - 10.1.0.3:8444
                        - 10.1.0.4:8444
                        - 10.1.0.5:8444
                        - 10.1.0.6:8444
                      tls_config:
                        ca_file: /etc/prometheus/tls/incus/ca.crt
                        cert_file: /etc/prometheus/tls/incus/metrics.crt
                        key_file: /etc/prometheus/tls/incus/metrics.key
                        server_name: incus
