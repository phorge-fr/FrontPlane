apiVersion: v1
kind: Namespace
metadata:
    name: loki
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
    name: grafana
    namespace: loki
spec:
    interval: 1m0s
    timeout: 1m0s
    url: https://grafana.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: loki
    namespace: loki
spec:
    chart:
        spec:
            chart: loki
            sourceRef:
                kind: HelmRepository
                name: grafana
            version: '*'
    interval: 1m0s
    values:
      loki:
        commonConfig:
          replication_factor: 1
        schemaConfig:
          configs:
            - from: 2024-04-01
              store: tsdb
              object_store: s3
              schema: v13
              index:
                prefix: loki_index_
                period: 24h
        ingester:
          chunk_encoding: snappy
        tracing:
          enabled: true
        querier:
          # Default is 4, if you have enough memory and CPU you can increase, reduce if OOMing
          max_concurrent: 2

      #gateway:
      #  ingress:
      #    enabled: true
      #    hosts:
      #      - host: FIXME
      #        paths:
      #          - path: /
      #            pathType: Prefix

      deploymentMode: SingleBinary
      singleBinary:
        replicas: 1
        resources:
          limits:
            cpu: 1
            memory: 512Mi
          requests:
            cpu: 1
            memory: 256Mi
        extraEnv:
          # Keep a little bit lower than memory limits
          - name: GOMEMLIMIT
            value: 3750MiB

      chunksCache:
        # default is 500MB, with limited memory keep this smaller
        writebackSizeLimit: 10MB

      # Enable minio for storage
      minio:
        enabled: true

      # Zero out replica counts of other deployment modes
      backend:
        replicas: 0
      read:
        replicas: 0
      write:
        replicas: 0

      ingester:
        replicas: 0
      querier:
        replicas: 0
      queryFrontend:
        replicas: 0
      queryScheduler:
        replicas: 0
      distributor:
        replicas: 0
      compactor:
        replicas: 0
      indexGateway:
        replicas: 0
      bloomCompactor:
        replicas: 0
      bloomGateway:
        replicas: 0

      # persistence:
      #   enabled: true
      #   size: 10Gi