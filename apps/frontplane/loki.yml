apiVersion: v1
kind: Namespace
metadata:
    name: loki
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
    name: grafana
    namespace: loki
spec:
    interval: 1m0s
    timeout: 1m0s
    url: https://grafana.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: loki
    namespace: loki
spec:
    chart:
        spec:
            chart: loki
            sourceRef:
                kind: HelmRepository
                name: grafana
            version: '*'
    interval: 1m0s
    values:
      loki:
        commonConfig:
          replication_factor: 1
        storage:
          type: 'filesystem'
      singleBinary:
        replicas: 1
